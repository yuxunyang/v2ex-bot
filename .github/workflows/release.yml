name: Release Bot

on:
  push:
    tags:
      - 'v*' # 匹配 v0.0.1, v1.0.0 等

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true # 开启缓存加速后续运行

      - name: Build All Platforms
        run: |
          mkdir -p dist
          # 使用简化的编译指令，确保与 Makefile 逻辑一致
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/v2ex_bot_linux_amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/v2ex_bot_linux_arm64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/v2ex_bot_darwin_arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/v2ex_bot_windows_amd64.exe .

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          # generate_release_notes: true # 自动根据提交生成更新日志
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}